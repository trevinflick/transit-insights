# Rotate cota-insights cron logs so they don't grow unbounded. This is a template;
# scripts/install-logrotate.sh substitutes CRON_LOG_DIR / SU_USER / SU_GROUP
# with values detected from the local checkout before writing to /etc/logrotate.d.
#
# copytruncate is intentional — bin/cron-run.sh appends with `>>` and never
# reopens the file, so a plain rename-and-create rotation would orphan its
# write handle until the next invocation. copytruncate preserves the inode.
#
# `su <user> <group>` is required because the cron/ directory is owned by the
# bot's user, not root — without it logrotate refuses ("insecure permissions").

CRON_LOG_DIR/*.log {
    su SU_USER SU_GROUP
    daily
    rotate 14
    # maxsize (not size) — `size` makes logrotate ignore the `daily` cadence
    # and only rotate when the cap is hit, so a 4 MB/day log waits months.
    # `maxsize` keeps the daily rotation but cuts in early if a log balloons
    # past the cap mid-day.
    maxsize 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    nocreate
}
